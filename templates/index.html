<!DOCTYPE html>
<html>
<head>
    <title>Handwriting Generator</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            text-align: center;
        }

        .container {
            margin-top: 80px;
        }

        h1 {
            font-size: 40px;
            margin-bottom: 10px;
        }

        p {
            color: #ddd;
        }

        .box {
            background: white;
            color: black;
            padding: 25px;
            border-radius: 12px;
            width: 400px;
            margin: auto;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        textarea {
            width: 100%;
            height: 100px;
            padding: 10px;
            font-size: 14px;
            border-radius: 8px;
            border: 1px solid #ccc;
            resize: none;
        }

        button {
            margin-top: 15px;
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
        }

        img {
            margin-top: 20px;
            width: 90%;
            max-width: 600px;
            border-radius: 10px;
            border: 3px solid white;
        }

        .footer {
            margin-top: 30px;
            font-size: 14px;
            color: #ccc;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>✍️ Handwriting Generator</h1>
    <p>Convert your text into realistic handwriting</p>

    <div class="box">
        <form method="POST">
            <textarea name="text" placeholder="Enter your text here..." required></textarea>
            <button type="submit">Generate</button>
        </form>
    </div>

    {% if image %}
        <h2>Output</h2>
        <img src="{{ url_for('static', filename='output.png') }}">
    {% endif %}

    <div class="footer">
        Made by Tanishk 🚀
    </div>
</div>

</body>
</html>
